<link rel="stylesheet" href="/static/style.css">

<h1>🛒 Loja REVELLION</h1>

<div class="container">

{% for p in produtos %}

<h3>{{p[1]}}</h3>
<p>{{p[2]}}</p>
<p>Preço: {{p[3]}}</p>

{% if session.get("user_id") %}

    {% if p[0] in compras %}
        <!-- Já comprou -->
        <a href="/download_seguro/{{p[0]}}" style="color: green;">⬇️ Baixar</a>
    {% else %}
        <!-- Não comprou -->
        <a href="/comprar/{{p[0]}}">💰 Comprar</a>
    {% endif %}

{% else %}
    <a href="/login">🔒 Faça login para comprar</a>
{% endif %}

<hr>

{% endfor %}
